<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah User - SIPUSTAKA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900 h-screen overflow-hidden">
    <div class="h-screen flex flex-col md:flex-row">
      
      <aside class="w-full md:w-72 h-screen bg-slate-950 text-slate-100 flex flex-col justify-between">
        <div>
          <div class="px-6 py-7 border-b border-slate-800 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white text-sm">P</div>
            <div>
              <h1 class="text-xs font-semibold tracking-wider text-slate-400">SIPUSTAKA</h1>
              <p class="text-sm font-bold text-slate-100 -mt-1">Sistem Peminjaman Buku</p>
            </div>
          </div>
          
          <nav class="px-4 py-6 space-y-1">
            <a href="{% url 'dashboard' %}" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-900 px-4 py-3 rounded-2xl transition">
              <span class="material-icons-outlined">dashboard</span> Dashboard
            </a>
            <a href="{% url 'buku' %}" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-900 px-4 py-3 rounded-2xl transition">
              <span class="material-icons-outlined">menu_book</span> Buku
            </a>
            <a href="{% url 'pinjam' %}" class="w-full flex items-center gap-3 text-slate-400 hover:bg-slate-900 px-4 py-3 rounded-2xl transition">
              <span class="material-icons-outlined">assignment</span> Peminjaman
            </a>
            <a href="{% url 'users' %}" class="w-full flex items-center gap-3 text-slate-200 bg-slate-900 px-4 py-3 rounded-2xl shadow-inner shadow-black/10">
              <span class="material-icons-outlined">group</span> User
            </a>
          </nav>
        </div>

        <div class="p-4 border-t border-slate-900 bg-slate-950/50 mb-4 mx-2 rounded-2xl">
          <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">Admin Aktif</p>
          <p class="text-sm font-bold text-slate-200 mt-0.5">Yusuf Iman Assidik</p>
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-6 md:p-12">
        <div class="max-w-4xl mx-auto space-y-6">
          
          <div class="flex items-center gap-2 text-slate-400 mb-2">
            <a href="{% url 'users' %}" class="hover:text-slate-600 transition flex items-center">
              <span class="material-icons-outlined text-lg">arrow_back</span>
            </a>
            <div class="text-xs font-semibold uppercase tracking-wide">Kelola User</div>
          </div>
          <h2 class="text-3xl font-bold text-slate-900 -mt-3">Detail User</h2>

          <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              
              <div class="bg-slate-50 border border-slate-200/60 p-6 rounded-2xl shadow-sm">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">ID</label>
                <input type="text" value="Otomatis" class="w-full bg-transparent text-sm font-bold text-slate-400 focus:outline-none cursor-not-allowed" readonly />
              </div>

              <div class="bg-slate-50 border border-slate-200/60 p-6 rounded-2xl shadow-sm focus-within:border-blue-500 focus-within:bg-white transition-all">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Nama</label>
                <input type="text" name="nama" placeholder="Ketik nama lengkap siswa..." class="w-full bg-transparent text-sm font-bold text-slate-800 placeholder-slate-300 focus:outline-none" required />
              </div>

              <div class="bg-slate-50 border border-slate-200/60 p-6 rounded-2xl shadow-sm focus-within:border-blue-500 focus-within:bg-white transition-all">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Kelas</label>
                <input type="text" name="kelas" placeholder="Contoh: XI IPA 1" class="w-full bg-transparent text-sm font-bold text-slate-800 placeholder-slate-300 focus:outline-none" required />
              </div>

              <div class="bg-slate-50 border border-slate-200/60 p-6 rounded-2xl shadow-sm focus-within:border-blue-500 focus-within:bg-white transition-all">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">NIS</label>
                <input type="text" name="nis" placeholder="Contoh: 2026001" class="w-full bg-transparent text-sm font-bold text-slate-800 placeholder-slate-300 focus:outline-none" required />
              </div>

              <div class="bg-slate-50 border border-slate-200/60 p-6 rounded-2xl shadow-sm focus-within:border-blue-500 focus-within:bg-white transition-all">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Status</label>
                <select name="status" class="w-full bg-transparent text-sm font-bold text-emerald-600 focus:outline-none cursor-pointer">
                  <option value="Aktif" class="text-emerald-600 font-bold">Aktif</option>
                  <option value="Tidak Aktif" class="text-rose-600 font-bold">Tidak Aktif</option>
                </select>
              </div>

              <div class="bg-slate-50 border border-slate-200/60 p-6 rounded-2xl shadow-sm">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Total Peminjaman</label>
                <div class="text-sm font-bold text-slate-800">0</div>
              </div>

            </div>

            <div class="bg-slate-50 border border-slate-200/60 p-6 rounded-2xl shadow-sm w-full">
              <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Peminjaman Aktif</label>
              <div class="text-xs text-slate-500 font-medium">Siswa baru belum memiliki riwayat peminjaman buku.</div>
            </div>

            <div class="flex justify-end gap-4 pt-4">
              <a href="{% url 'users' %}" class="rounded-2xl bg-slate-200 hover:bg-slate-300 px-8 py-3.5 font-bold text-slate-600 transition text-xs">Batal</a>
              <button type="submit" class="rounded-2xl bg-blue-600 hover:bg-blue-700 px-8 py-3.5 font-bold text-white shadow-xl shadow-blue-600/30 transition text-xs">Simpan Anggota</button>
            </div>

          </form>
        </div>
      </main>
    </div>
  </body>
</html>
